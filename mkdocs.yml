site_name: chebfunjax
site_url: https://ma-gilles.github.io/chebfunjax
repo_url: https://github.com/ma-gilles/chebfunjax
repo_name: ma-gilles/chebfunjax

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: install.md
    - Quick Start: quickstart.md
  - Examples:
    - 1D Approximation:
      - Overview: examples/approx/index.md
      - Chebyshev Technology: examples/cheb/index.md
      - Fourier Series: examples/fourier/index.md
    - 2D & 3D Approximation:
      - Chebfun2 (2D): examples/approx2/index.md
      - Chebfun3 (3D): examples/approx3/index.md
      - Disk Functions: examples/disk/index.md
      - Sphere Functions: examples/sphere/index.md
    - Calculus & Rootfinding:
      - Calculus: examples/calc/index.md
      - Rootfinding: examples/roots/index.md
      - Quadrature: examples/quad/index.md
      - Optimization: examples/opt/index.md
    - Differential Equations:
      - Linear ODEs: examples/ode-linear/index.md
      - Nonlinear ODEs: examples/ode-nonlin/index.md
      - ODE Eigenvalues: examples/ode-eig/index.md
      - Random ODEs: examples/ode-random/index.md
      - PDEs: examples/pde/index.md
      - Integro-Differential: examples/integro/index.md
    - Linear Algebra & Complex Analysis:
      - Linear Algebra: examples/linalg/index.md
      - Complex Analysis: examples/complex/index.md
      - Vector Calculus: examples/veccalc/index.md
    - Other Topics:
      - Fun & Games: examples/fun/index.md
      - Geometry: examples/geom/index.md
      - Statistics: examples/stats/index.md
      - Applications: examples/applics/index.md
      - Miscellaneous: examples/temp/index.md
  - Reference:
    - API: api.md
    - JAX Contract: jax-contract.md
    - Architecture: architecture.md
    - Testing: testing.md
