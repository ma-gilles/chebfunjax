site_name: chebfunjax
site_url: https://ma-gilles.github.io/chebfunjax
repo_url: https://github.com/ma-gilles/chebfunjax
repo_name: ma-gilles/chebfunjax

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.indexes
    - search.highlight
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: install.md
    - Quick Start: quickstart.md
  - Guide:
    - "1. Getting Started": guide/guide01.md
    - "2. Integration and Differentiation": guide/guide02.md
    - "3. Rootfinding and Minima and Maxima": guide/guide03.md
    - "4. Approximation Theory": guide/guide04.md
    - "5. Complex Chebfuns": guide/guide05.md
    - "6. Quasimatrices and Least-Squares": guide/guide06.md
    - "7. Linear Differential Operators": guide/guide07.md
    - "8. Preferences": guide/guide08.md
    - "9. Infinite Intervals and Singularities": guide/guide09.md
    - "10. Nonlinear ODEs and IVPs": guide/guide10.md
    - "11. Periodic Chebfuns": guide/guide11.md
    - "12. Chebfun2: Getting Started": guide/guide12.md
    - "13. Chebfun2: Calculus": guide/guide13.md
    - "14. Chebfun2: Rootfinding": guide/guide14.md
    - "15. Chebfun2: Vector Calculus": guide/guide15.md
    - "16. Diskfun": guide/guide16.md
    - "17. Spherefun": guide/guide17.md
    - "18. Chebfun3": guide/guide18.md
    - "19. SPIN for Stiff PDEs": guide/guide19.md
    - "20. Ballfun": guide/guide20.md
  - Examples:
    - Applications: examples/applics/index.md
    - Approximation (1D): examples/approx/index.md
    - Approximation (2D): examples/approx2/index.md
    - Approximation (3D): examples/approx3/index.md
    - Calculus: examples/calc/index.md
    - Chebyshev expansions: examples/cheb/index.md
    - Complex variables: examples/complex/index.md
    - Disk: examples/disk/index.md
    - Fourier analysis: examples/fourier/index.md
    - Fun stuff: examples/fun/index.md
    - Geometry: examples/geom/index.md
    - Integral equations: examples/integro/index.md
    - Linear algebra: examples/linalg/index.md
    - ODE eigenvalue problems: examples/ode-eig/index.md
    - ODEs (linear): examples/ode-linear/index.md
    - ODEs (nonlinear): examples/ode-nonlin/index.md
    - Optimization: examples/opt/index.md
    - Partial differential equations: examples/pde/index.md
    - Quadrature: examples/quad/index.md
    - Random ODEs: examples/ode-random/index.md
    - Rootfinding: examples/roots/index.md
    - Sphere and ball: examples/sphere/index.md
    - Statistics and probability: examples/stats/index.md
    - Vector calculus: examples/veccalc/index.md
  - Reference:
    - API: api.md
    - JAX Contract: jax-contract.md
    - Architecture: architecture.md
    - Testing: testing.md
