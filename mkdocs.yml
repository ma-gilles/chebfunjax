site_name: chebfunjax
site_url: https://ma-gilles.github.io/chebfunjax
repo_url: https://github.com/ma-gilles/chebfunjax
repo_name: ma-gilles/chebfunjax

theme:
  name: material
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Installation: install.md
  - Quick Start: quickstart.md
  - Examples:
    - Approximation: examples/approx.md
    - Calculus: examples/calc.md
    - Rootfinding: examples/roots.md
    - ODE/BVP: examples/ode.md
    - PDE: examples/pde.md
    - 2D Functions: examples/chebfun2.md
    - 3D Functions: examples/chebfun3.md
    - Approximation (1D advanced): examples/approx2/index.md
    - Approximation (3D): examples/approx3/index.md
    - Chebyshev topics: examples/cheb/index.md
    - Disk functions: examples/disk/index.md
    - Fourier: examples/fourier/index.md
    - Fun examples: examples/fun/index.md
    - Geometry: examples/geom/index.md
    - Integro-differential: examples/integro/index.md
    - Linear algebra: examples/linalg/index.md
    - Optimization: examples/opt/index.md
    - PDE gallery: examples/pde/index.md
    - Sphere: examples/sphere/index.md
    - Statistics: examples/stats/index.md
    - Vector calculus: examples/veccalc/index.md
    - Applications: examples/applics/index.md
  - API Reference: api.md
  - JAX Contract: jax-contract.md
