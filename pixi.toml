[project]
name = "chebfunjax"
channels = ["conda-forge", "nvidia"]
platforms = ["linux-64"]

[dependencies]
python = ">=3.10,<3.13"
pip = "*"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.7"
pytest = ">=7.0"
pytest-xdist = "*"
pytest-cov = "*"
ruff = "*"
mkdocs = "*"
mkdocs-material = "*"

# JAX with CUDA support
[pypi-dependencies]
jax = { version = ">=0.4.20", extras = ["cuda12"] }
equinox = ">=0.11"
chebfunjax = { path = ".", editable = true }

[tasks]
test-fast = "python -m pytest tests/ -m 'not slow and not gpu and not matlab' -v --tb=short"
test-full = "python -m pytest tests/ -v --tb=short --cov=chebfunjax --cov-report=term-missing"
test-gpu = "python -m pytest tests/ -m gpu -v --tb=short"
test-matlab = "python -m pytest tests/ -m matlab -v --tb=short"
check-jax = "python -c \"import jax; print('JAX devices:', jax.devices())\""
lint = "ruff check src/ tests/"
format = "ruff format src/ tests/"
smoke = "python -c \"import chebfunjax; print('chebfunjax imported OK')\""
generate-plots = "python examples/generate_all_plots.py"
