name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI is the sole reviewer. If all jobs pass, the PR is safe to auto-merge.
# Configure branch protection to require all these jobs (scripts/setup-branch-protection.sh).

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3

  code-quality:
    name: Code quality checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No numpy imports in library code
        run: |
          FAIL=0
          if grep -rn "^import numpy" src/ --include="*.py" | grep -v "jax.numpy"; then
            echo "FAIL: Found 'import numpy' in library code. Use jax.numpy."
            FAIL=1
          fi
          if grep -rn "^from numpy" src/ --include="*.py"; then
            echo "FAIL: Found 'from numpy' in library code. Use jax.numpy."
            FAIL=1
          fi
          [ $FAIL -eq 0 ] && echo "OK: No numpy imports in library code."
          exit $FAIL

      - name: Provenance docstrings present
        run: |
          MISSING=""
          for f in $(find src/chebfunjax -name "*.py" ! -name "__init__.py" ! -name "_*" -size +100c); do
            if ! grep -q "Provenance" "$f"; then
              MISSING="$MISSING\n  $f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo -e "FAIL: Missing Provenance section in:$MISSING"
            exit 1
          fi
          echo "OK: All source files have Provenance docstrings."

      - name: Golden refs committed for MATLAB tests
        run: |
          pip install -q scipy numpy
          python -c "
          from pathlib import Path
          import re, sys

          test_dir = Path('tests')
          ref_dir = test_dir / 'references'
          refs = {f.stem for f in ref_dir.glob('*.mat')}

          needed = set()
          for tf in test_dir.rglob('test_*.py'):
              text = tf.read_text()
              if 'pytest.mark.matlab' in text:
                  for m in re.finditer(r'load_matlab_ref\([\"\\'](\w+)\.mat', text):
                      needed.add(m.group(1))
                  for m in re.finditer(r'\"matlab_ref\",\s*\[\"(\w+)\"\]', text):
                      needed.add(m.group(1))
                  # Match fixture parameters like (self, matlab_quadrature) but not
                  # method names like def test_vs_matlab_cheb(self, ...)
                  for m in re.finditer(r'(?:,\s*|def\s+)matlab_(\w+)\s*[,\)]', text):
                      name = m.group(1)
                      if name not in ('ref',) and not name.startswith('test'):
                          needed.add(name)

          missing = needed - refs
          if missing:
              print('FAIL: MATLAB tests need these uncommitted refs:')
              for m in sorted(missing):
                  print(f'  tests/references/{m}.mat')
              sys.exit(1)
          print(f'OK: {len(needed)} golden refs verified ({len(refs)} committed).')
          "

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
      - name: Run all tests with coverage
        run: pixi run test-full

  golden-refs:
    name: Validate golden refs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate .mat files
        run: |
          pip install -q scipy numpy
          python -c "
          from pathlib import Path
          import scipy.io
          refs = list(Path('tests/references').glob('*.mat'))
          assert len(refs) > 0, 'No golden refs found'
          for f in sorted(refs):
              d = scipy.io.loadmat(str(f), squeeze_me=True)
              keys = [k for k in d if not k.startswith('__')]
              print(f'{f.name}: {len(keys)} fields')
          print(f'OK: {len(refs)} golden ref files validated')
          "
